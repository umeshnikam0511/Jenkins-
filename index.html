<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirana Store</title>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }

.login-box {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #f5f5f5;
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.login-card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

header {
  background: #2e7d32;
  color: white;
  padding: 15px;
  text-align: center;
}

.container { padding: 15px; }

.product-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 15px;
}

.product {
  background: white;
  padding: 10px;
  border-radius: 12px;
  text-align: center;
}

.product img {
  width: 100%;
  height: 60px;
  object-fit: cover;
  border-radius: 8px;
}

button {
  background: #ff9800;
  color: white;
  border: none;
  padding: 5px 8px;
  border-radius: 10px;
  margin: 2px;
  cursor: pointer;
}

.add-product {
  background: white;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 15px;
  display: none;
}

.cart {
  background: white;
  padding: 10px;
  border-radius: 8px;
  margin-top: 15px;
}

@media (max-width: 768px) {
  .product-row {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <div class="login-card">
    <h3>Admin Login</h3>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
  </div>
</div>

<header>🛒 My Kirana Store</header>

<div class="container">

<div class="add-product" id="adminPanel">
  <h3>Add Product</h3>
  <input type="text" id="pname" placeholder="Product Name">
  <input type="number" id="pprice" placeholder="Price">
  <input type="file" id="pimage">
  <button onclick="addProduct()">Add Product</button>
</div>

<h3>Products</h3>
<div id="products" class="product-row"></div>

<div class="cart">
  <h3>Cart</h3>
  <ul id="cart"></ul>
  <h4 id="total">Total: ₹0</h4>
  <button onclick="orderWhatsApp()">Order on WhatsApp</button>
</div>

</div>

<script>

// ADMIN CHECK
function checkAdminAccess() {
  const params = new URLSearchParams(window.location.search);
  if(params.get("admin") === "true") {
    document.getElementById("loginBox").style.display = "flex";
  }
}

// LOGIN
function login() {
  if(username.value === "umeshstore" && password.value === "Kedai@1677") {
    localStorage.setItem("isAdmin", "true");
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("Wrong credentials");
  }
}

// CHECK LOGIN
function checkLogin() {
  if(localStorage.getItem("isAdmin") === "true") {
    document.getElementById("adminPanel").style.display = "block";
  }
}

// PRODUCTS
let products = JSON.parse(localStorage.getItem("products")) || [
  { name: "Rice 1kg", price: 60, image: "https://images.unsplash.com/photo-1586201375761-83865001e31c" },
  { name: "Atta 1kg", price: 50, image: "https://images.unsplash.com/photo-1604908177522-402c2c6b7c62" },
  { name: "Toor Dal 1kg", price: 120, image: "https://images.unsplash.com/photo-1615485290382-441e4d049cb5" },
  { name: "Sugar 1kg", price: 45, image: "https://images.unsplash.com/photo-1587049352846-4a222e784d38" },
  { name: "Oil 1L", price: 140, image: "https://images.unsplash.com/photo-1604908176997-431221b28f17" }
];

// SAVE
function saveProducts() {
  localStorage.setItem("products", JSON.stringify(products));
}

// LOAD
function loadProducts() {
  let html = "";

  products.forEach((p,i)=>{
    const name = p.name || "No Name";
    const price = Number(p.price) || 0;

    html += `
      <div class="product">
        <img src="${p.image || ''}">
        <h4>${name}</h4>
        <p>₹${price}</p>
        <button onclick="addToCart(${i})">Add</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

// ADD PRODUCT
function addProduct() {
  const name = pname.value.trim();
  const price = parseFloat(pprice.value);

  if(!name || isNaN(price)) {
    alert("Enter valid name and price");
    return;
  }

  const file = pimage.files[0];

  if(file){
    const reader = new FileReader();
    reader.onload = e=>{
      products.push({ name, price, image: e.target.result });
      saveProducts();
      loadProducts();
    };
    reader.readAsDataURL(file);
  } else {
    products.push({ name, price, image: "" });
    saveProducts();
    loadProducts();
  }

  pname.value = "";
  pprice.value = "";
}

// CART
let cart = [];

function addToCart(i){
  const item = products[i];
  const exist = cart.find(p => p.name === item.name);

  if(exist){
    exist.qty++;
  } else {
    cart.push({...item, qty:1});
  }

  displayCart();
}

function changeQty(i,val){
  cart[i].qty += val;
  if(cart[i].qty <= 0){
    cart.splice(i,1);
  }
  displayCart();
}

function removeItem(i){
  cart.splice(i,1);
  displayCart();
}

function displayCart(){
  let html = "", total = 0;

  cart.forEach((item,i)=>{
    total += item.price * item.qty;

    html += `
      <li>
        ${item.name} - ₹${item.price} x ${item.qty}
        <button onclick="changeQty(${i},1)">+</button>
        <button onclick="changeQty(${i},-1)">-</button>
        <button onclick="removeItem(${i})">❌</button>
      </li>
    `;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = "Total: ₹"+total;
}

// WHATSAPP
function orderWhatsApp(){
  let msg = "Order:%0A";

  cart.forEach(item=>{
    msg += `${item.name} x ${item.qty} = ₹${item.price * item.qty}%0A`;
  });

  window.open("https://wa.me/919876543210?text=" + msg);
}

// INIT
checkAdminAccess();
checkLogin();
loadProducts();

</script>

</body>
</html>
