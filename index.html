<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f1f3f6;
}

/* Header */
.header {
    background: #2874f0;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header input {
    width: 40%;
    padding: 8px;
    border-radius: 3px;
    border: none;
}

/* Products */
.container {
    padding: 20px;
}

.products {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 5px;
    text-align: center;
    box-shadow: 0 0 5px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: contain;
}

.card button {
    background: #fb641b;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
    margin-top: 10px;
}

.card button:hover {
    background: #e55b13;
}
</style>

</head>

<body>

<div class="header">
    <h2>My Shop 🛒</h2>
    <input type="text" placeholder="Search for products...">
</div>

<div class="container">
    <h3>Top Products</h3>

    <div class="products">

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h4>Mobile</h4>
            <p>₹15,000</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h4>Laptop</h4>
            <p>₹55,000</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h4>Shoes</h4>
            <p>₹2,000</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h4>Watch</h4>
            <p>₹1,500</p>
            <button>Add to Cart</button>
        </div>

    </div>
</div>

</body>
</html>
